<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light only">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Our Love Journey</title>
  <link rel="stylesheet" href="css/style.css?v=33">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pacifico&family=Noto+Sans+SC:wght@400;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 爱心轨迹画布 -->
  <canvas id="heartCanvas"></canvas>

  <!-- 登录页面 -->
  <div id="loginPage">
    <div class="login-card">
      <h1 class="login-title">💕</h1>
      <p class="login-subtitle">这是属于我们的秘密空间</p>
      <div class="login-input-group">
        <input type="password" id="passwordInput" placeholder="输入我们的暗号..." autocomplete="off">
        <button id="loginBtn" onclick="handleLogin()">进入</button>
      </div>
      <p id="loginError" class="login-error">暗号不对哦～再想想</p>
    </div>
  </div>

  <!-- 主页面 -->
  <div id="mainPage" style="display: none;">
    <!-- 导航栏 -->
    <nav>
      <div class="nav-container">
        <h1 id="siteTitle">Our Love Journey</h1>
      </div>
    </nav>

    <main>
      <!-- 首页封面 -->
      <section id="coverSection">
        <div class="cover-copy">
          <p class="cover-eyebrow">Our Love Journey</p>
          <section id="nameSection">
            <h2 id="coupleNames"></h2>
          </section>

          <section id="timerSection">
            <audio id="bgm"></audio>
            <p>我们已经相爱了</p>
            <h2><span id="loveDays">0</span> 天</h2>

            <div id="musicPlayer">
              <div class="player-bar">
                <button id="playBtn" class="player-btn play-icon" onclick="togglePlay()" aria-label="播放或暂停音乐"></button>
                <div class="now-playing">
                  <span id="nowPlayingText" class="marquee">选择一首歌吧</span>
                </div>
                <button id="playlistToggle" class="player-btn" onclick="togglePlaylist()" aria-label="展开歌单">☰</button>
              </div>
              <div id="playlistPanel" class="playlist-panel"></div>
            </div>
          </section>

          <section id="quoteSection" style="display: none;">
            <h3>今日情话</h3>
            <div id="dailyQuote">
              <p id="quoteText" class="quote-text"></p>
              <p id="quoteSource" class="quote-source"></p>
            </div>
          </section>
        </div>

        <div class="cover-photos" aria-label="我们的照片封面">
          <img class="cover-photo cover-photo-main" src="images/thumbs/0.jpg" alt="Ading 和 Lili 的回忆照片">
          <img class="cover-photo cover-photo-small cover-photo-top" src="images/thumbs/1.jpg" alt="我们的日常瞬间">
          <img class="cover-photo cover-photo-small cover-photo-bottom" src="images/thumbs/2.jpg" alt="我们的纪念照片">
        </div>
      </section>

      <!-- 重要日期 -->
      <section id="datesSection"></section>

      <!-- 照片墙 -->
      <section id="gallerySection">
        <div id="gallery"></div>
        <div id="loadingIndicator" class="loading-indicator">
          <span>加载中...</span>
        </div>
      </section>

      <!-- 时间线 -->
      <section id="timelineSection">
        <h3>💕 我们的故事</h3>
        <div id="timeline"></div>
      </section>

      <!-- 留言区 -->
      <section id="messageSection">
        <h3>💌 我们的小情书</h3>
        <p class="message-subtitle">愿每一句话，都被好好收藏</p>
        <div id="messageBoard">
          <script src="https://giscus.app/client.js"
            data-repo="LuckyKingADing/ading-lili-website"
            data-repo-id="R_kgDOTL4eBQ"
            data-category="General"
            data-category-id="DIC_kwDOTL4eBc4DAYWF"
            data-mapping="specific"
            data-term="Our Love Journey Guestbook"
            data-strict="1"
            data-reactions-enabled="0"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="https://LuckyKingADing.github.io/ading-lili-website/css/giscus-love.css?v=2"
            data-lang="zh-CN"
            crossorigin="anonymous"
            async>
          </script>
        </div>
      </section>
    </main>

    <footer>
      <p>Made with 💕 by Ading & Lili</p>
    </footer>
  </div>

  <!-- 图片弹窗 -->
  <div id="popup" aria-hidden="true">
    <button id="closeBtn" onclick="closePopup()" aria-label="关闭照片">&times;</button>
    <button id="leftArrow" class="arrow" onclick="showPreviousImage()" aria-label="上一张照片">‹</button>
    <div class="viewer-frame">
      <img id="popupImg" src="" alt="Photo">
      <div class="viewer-meta">
        <p id="imgDate"></p>
        <p id="photoCounter"></p>
      </div>
    </div>
    <button id="rightArrow" class="arrow" onclick="showNextImage()" aria-label="下一张照片">›</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
  <script src="config.js?v=4"></script>
  <script src="js/hearts.js?v=1"></script>
  <script src="js/app.js?v=13"></script>
</body>
</html>
